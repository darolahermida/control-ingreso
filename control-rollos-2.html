<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0d1117">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Control Rollos">
  <title>Control de Rollos</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0d1117;--surface:#161b22;--surface2:#1c2128;--border:#30363d;--accent:#f0a500;--accent2:#e05c00;--green:#2ea043;--red:#da3633;--blue:#388bfd;--purple:#a371f7;--text:#e6edf3;--muted:#7d8590;--radius:10px}
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100dvh;overflow-x:hidden}
    header{background:var(--surface);border-bottom:2px solid var(--accent);padding:14px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
    .logo-icon{width:38px;height:38px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
    header h1{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.1rem;text-transform:uppercase;letter-spacing:.05em;line-height:1.2;flex:1}
    header h1 span{display:block;font-size:.7rem;font-weight:400;letter-spacing:.1em;color:var(--muted)}
    .tabs{display:flex;border-bottom:1px solid var(--border);background:var(--surface);overflow-x:auto;scrollbar-width:none}
    .tabs::-webkit-scrollbar{display:none}
    .tab{flex:1;padding:13px 8px;border:none;background:transparent;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:.82rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap}
    .tab.active{color:var(--accent);border-bottom-color:var(--accent)}
    .page{display:none;padding:18px;padding-bottom:32px}.page.active{display:block}
    .section-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.95rem;text-transform:uppercase;letter-spacing:.1em;color:var(--accent);margin-bottom:12px;display:flex;align-items:center;gap:8px}
    .section-title::after{content:'';flex:1;height:1px;background:var(--border)}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:14px}
    .field{margin-bottom:13px}.field:last-child{margin-bottom:0}
    label{display:block;font-size:.72rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
    input,select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'Barlow',sans-serif;font-size:1rem;padding:11px 14px;outline:none;transition:border-color .2s;-webkit-appearance:none}
    input:focus,select:focus{border-color:var(--accent)}
    select option{background:var(--surface2)}
    input::placeholder{color:var(--muted)}
    .row2{display:grid;grid-template-columns:1fr 1fr;gap:11px}

    /* VOZ */
    .input-voice{display:flex;gap:8px;align-items:center}
    .input-voice input{flex:1}
    .btn-voice{width:44px;height:44px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface2);color:var(--muted);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
    .btn-voice.escuchando{background:rgba(218,54,51,.2);border-color:var(--red);color:var(--red);animation:pulseVoz 1s infinite}
    @keyframes pulseVoz{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}

    /* TIPO */
    .tipo-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
    .tipo-btn{background:var(--bg);border:2px solid var(--border);border-radius:var(--radius);color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:1rem;text-transform:uppercase;letter-spacing:.05em;padding:16px 10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;transition:all .2s}
    .tipo-btn .icon{font-size:1.8rem}
    .tipo-btn.sel-envio{background:rgba(46,160,67,.12);border-color:var(--green);color:var(--green)}
    .tipo-btn.sel-desarme{background:rgba(163,113,247,.12);border-color:var(--purple);color:var(--purple)}

    /* TRANSPORTISTAS */
    .transport-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:6px}
    .transport-btn{background:var(--bg);border:1.5px solid var(--border);border-radius:8px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.82rem;text-transform:uppercase;letter-spacing:.03em;padding:10px 6px;cursor:pointer;text-align:center;transition:all .2s;line-height:1.2}
    .transport-btn.selected{background:rgba(56,139,253,.15);border-color:var(--blue);color:var(--blue)}
    .transport-section{display:none;margin-bottom:14px}
    .transport-section.visible{display:block}
    .transport-label{font-size:.72rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}

    .btn-submit{width:100%;border:none;border-radius:var(--radius);font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.1rem;text-transform:uppercase;letter-spacing:.08em;padding:17px;cursor:pointer;transition:opacity .2s,transform .1s;margin-top:6px;display:flex;align-items:center;justify-content:center;gap:8px}
    .btn-submit:active{opacity:.85;transform:scale(.98)}
    .btn-submit:disabled{opacity:.4;pointer-events:none}
    .btn-submit.azul{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000}
    .btn-submit.verde{background:linear-gradient(135deg,var(--green),#1a7a30);color:#fff}
    .btn-submit.morado{background:linear-gradient(135deg,var(--purple),#7c3aed);color:#fff}
    .btn-submit.gris{background:var(--surface2);color:var(--text);border:1px solid var(--border)}

    .stock-box{background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:12px 14px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
    .stock-box-label{font-size:.8rem;color:var(--muted);font-weight:500}
    .stock-box-val{font-family:'Barlow Condensed',sans-serif;font-size:1.4rem;font-weight:700}

    .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
    .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 8px;text-align:center}
    .stat-val{font-family:'Barlow Condensed',sans-serif;font-size:2rem;font-weight:900;line-height:1}
    .stat-lbl{font-size:.65rem;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:.06em}
    .stat-card.azul .stat-val{color:var(--blue)}.stat-card.verde .stat-val{color:var(--green)}.stat-card.rojo .stat-val{color:var(--red)}

    .stock-list,.mov-list{list-style:none}
    .stock-item{display:flex;align-items:center;padding:11px 0;border-bottom:1px solid var(--border);gap:12px}
    .stock-item:last-child{border-bottom:none}
    .stock-avatar{width:38px;height:38px;border-radius:9px;background:rgba(240,165,0,.12);display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:16px;color:var(--accent);flex-shrink:0}
    .stock-info{flex:1;min-width:0}
    .stock-nombre{font-size:.9rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .stock-num{font-size:.72rem;color:var(--muted);margin-top:1px}
    .stock-qty{font-family:'Barlow Condensed',sans-serif;font-size:1.5rem;font-weight:900;min-width:44px;text-align:right}
    .stock-qty.ok{color:var(--green)}.stock-qty.bajo{color:var(--accent)}.stock-qty.vacio{color:var(--red)}

    .mov-item{display:flex;align-items:center;padding:11px 0;border-bottom:1px solid var(--border);gap:11px}
    .mov-item:last-child{border-bottom:none}
    .mov-ico{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
    .mov-ico.ing{background:rgba(46,160,67,.15)}.mov-ico.env{background:rgba(56,139,253,.15)}.mov-ico.dsm{background:rgba(163,113,247,.15)}
    .mov-datos{flex:1;min-width:0}
    .mov-cliente{font-size:.88rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .mov-detalle{font-size:.72rem;color:var(--muted);margin-top:1px}
    .mov-cant{font-family:'Barlow Condensed',sans-serif;font-size:1.1rem;font-weight:700;white-space:nowrap}
    .mov-cant.ing{color:var(--green)}.mov-cant.env{color:var(--blue)}.mov-cant.dsm{color:var(--purple)}
    .btn-edit-mov{background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.72rem;padding:4px 10px;cursor:pointer;margin-top:4px;display:inline-block}

    .autocomplete-wrap{position:relative}
    .sug-list{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--surface2);border:1px solid var(--border);border-radius:9px;box-shadow:0 8px 24px rgba(0,0,0,.5);z-index:50;max-height:200px;overflow-y:auto;display:none}
    .sug-item{padding:12px 14px;font-size:.9rem;cursor:pointer;border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:center}
    .sug-item:last-child{border-bottom:none}
    .sug-item:active{background:var(--surface)}
    .sug-num{color:var(--accent);font-family:'Barlow Condensed',sans-serif;font-size:.9rem;font-weight:700;min-width:48px}

    .cliente-preview{background:rgba(240,165,0,.08);border:1px solid rgba(240,165,0,.3);border-radius:9px;padding:12px 14px;margin-bottom:13px;display:none}
    .cliente-preview-nombre{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:1.1rem;color:var(--accent)}
    .cliente-preview-num{font-size:.75rem;color:var(--muted);margin-top:2px}

    /* MODAL EDITAR */
    .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;display:none;align-items:flex-end;justify-content:center}
    .modal-bg.open{display:flex}
    .modal-sheet{background:var(--surface);border:1px solid var(--border);border-radius:18px 18px 0 0;padding:24px 20px 36px;width:100%;max-height:90dvh;overflow-y:auto;animation:slideup .25s ease}
    @keyframes slideup{from{transform:translateY(100%)}to{transform:translateY(0)}}
    .modal-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.2rem;text-transform:uppercase;letter-spacing:.08em;color:var(--accent);margin-bottom:20px;display:flex;justify-content:space-between;align-items:center}
    .btn-close-modal{background:var(--surface2);border:1px solid var(--border);border-radius:50%;color:var(--muted);width:32px;height:32px;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center}

    .empty{text-align:center;padding:36px 16px;color:var(--muted)}
    .empty-icon{font-size:2.5rem;margin-bottom:8px}
    .empty p{font-size:.85rem}
    .spinner{width:20px;height:20px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .65s linear infinite}
    .spinner.dark{border:2px solid rgba(0,0,0,.3);border-top-color:#000}
    @keyframes spin{to{transform:rotate(360deg)}}
    #toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--green);color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:1rem;letter-spacing:.05em;padding:13px 24px;border-radius:30px;z-index:9999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center}
    #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    #toast.error{background:var(--red)}#toast.warn{background:#7d5c00}
  </style>
</head>
<body>
<header>
  <div class="logo-icon">📦</div>
  <h1>Control de Rollos<span id="fechaHeader">Cargando...</span></h1>
</header>
<div class="tabs">
  <button class="tab active" onclick="mostrarPagina('ingreso',this)">➕ Ingreso</button>
  <button class="tab" onclick="mostrarPagina('salida',this)">📤 Salida</button>
  <button class="tab" onclick="mostrarPagina('inventario',this)">📊 Stock</button>
  <button class="tab" onclick="mostrarPagina('historial',this)">🕘 Historial</button>
</div>

<!-- INGRESO -->
<div id="page-ingreso" class="page active">
  <div class="section-title">➕ Registrar Ingreso</div>
  <div class="card">
    <div class="row2">
      <div class="field"><label>Día</label>
        <select id="dia-ingreso"><option>Lunes</option><option>Martes</option><option>Miércoles</option><option>Jueves</option><option>Viernes</option><option>Sábado</option></select>
      </div>
      <div class="field"><label>Cantidad</label>
        <div class="input-voice">
          <input type="number" id="cant-ingreso" placeholder="0" min="1" inputmode="numeric">
          <button class="btn-voice" onclick="iniciarVoz('cant-ingreso','numero')" title="Voz">🎤</button>
        </div>
      </div>
    </div>
    <div class="field"><label>N° de Pedido</label>
      <div class="autocomplete-wrap">
        <div class="input-voice">
          <input type="text" id="numcli-ingreso" placeholder="Escribí el número..." inputmode="numeric" oninput="filtrarSugerencias('ingreso')" autocomplete="off">
          <button class="btn-voice" onclick="iniciarVoz('numcli-ingreso','numero')" title="Voz">🎤</button>
        </div>
        <div class="sug-list" id="sugs-ingreso"></div>
      </div>
    </div>
    <div class="cliente-preview" id="preview-ingreso">
      <div class="cliente-preview-nombre" id="preview-ingreso-nombre"></div>
      <div class="cliente-preview-num" id="preview-ingreso-num"></div>
    </div>
    <div class="field"><label>Nombre del Cliente (si es nuevo)</label>
      <div class="input-voice">
        <input type="text" id="cli-ingreso" placeholder="Solo para pedidos nuevos" autocomplete="off">
        <button class="btn-voice" onclick="iniciarVoz('cli-ingreso','texto')" title="Voz">🎤</button>
      </div>
    </div>
    <button class="btn-submit azul" id="btn-ingreso" onclick="registrarIngreso()"><span>Registrar Ingreso</span></button>
  </div>
</div>

<!-- SALIDA -->
<div id="page-salida" class="page">
  <div class="section-title">📤 Tipo de Salida</div>
  <div class="tipo-row">
    <button class="tipo-btn" id="tipo-envio" onclick="selTipo('envio')"><span class="icon">🚚</span>Envío</button>
    <button class="tipo-btn" id="tipo-desarme" onclick="selTipo('desarme')"><span class="icon">🔧</span>Desarme</button>
  </div>
  <div class="transport-section" id="transport-section">
    <div class="transport-label">🚛 Empresa de Transporte</div>
    <div class="transport-grid">
      <button class="transport-btn" onclick="selTransporte(this,'Via Cargo')">Via Cargo</button>
      <button class="transport-btn" onclick="selTransporte(this,'Crédito')">Crédito</button>
      <button class="transport-btn" onclick="selTransporte(this,'Buspack')">Buspack</button>
      <button class="transport-btn" onclick="selTransporte(this,'Integralpack')">Integralpack</button>
      <button class="transport-btn" onclick="selTransporte(this,'Niclis')">Niclis</button>
      <button class="transport-btn" onclick="selTransporte(this,'Testa')">Testa</button>
      <button class="transport-btn" onclick="selTransporte(this,'Transpack')">Transpack</button>
      <button class="transport-btn" onclick="selTransporte(this,'Exp Jet')">Exp Jet</button>
      <button class="transport-btn" onclick="selTransporte(this,'Exp Norte')">Exp Norte</button>
      <button class="transport-btn" onclick="selTransporte(this,'Raosa')">Raosa</button>
      <button class="transport-btn" onclick="selTransporte(this,'MD Carga')">MD Carga</button>
      <button class="transport-btn" onclick="selTransporte(this,'Central Arg')">Central Arg</button>
      <button class="transport-btn" onclick="selTransporte(this,'Andreani')">Andreani</button>
      <button class="transport-btn" onclick="selTransporte(this,'Correo')">Correo</button>
      <button class="transport-btn" onclick="selTransporte(this,'Chofer')">Chofer</button>
      <button class="transport-btn" onclick="selTransporte(this,'Otro')">Otro</button>
    </div>
  </div>
  <div class="card">
    <div class="row2">
      <div class="field"><label>Día</label>
        <select id="dia-salida"><option>Lunes</option><option>Martes</option><option>Miércoles</option><option>Jueves</option><option>Viernes</option><option>Sábado</option></select>
      </div>
      <div class="field"><label>Cantidad</label>
        <div class="input-voice">
          <input type="number" id="cant-salida" placeholder="0" min="1" inputmode="numeric">
          <button class="btn-voice" onclick="iniciarVoz('cant-salida','numero')" title="Voz">🎤</button>
        </div>
      </div>
    </div>
    <div class="field"><label>N° de Pedido</label>
      <div class="autocomplete-wrap">
        <div class="input-voice">
          <input type="text" id="numcli-salida" placeholder="Escribí el número..." inputmode="numeric" oninput="buscarPedido()" autocomplete="off">
          <button class="btn-voice" onclick="iniciarVoz('numcli-salida','numero')" title="Voz">🎤</button>
        </div>
        <div class="sug-list" id="sugs-salida"></div>
      </div>
    </div>
    <div class="cliente-preview" id="preview-salida">
      <div class="cliente-preview-nombre" id="preview-salida-nombre"></div>
      <div class="cliente-preview-num" id="preview-salida-num"></div>
    </div>
    <div class="stock-box">
      <span class="stock-box-label">Stock disponible</span>
      <span class="stock-box-val" id="stock-preview" style="color:var(--muted)">—</span>
    </div>
    <button class="btn-submit verde" id="btn-salida" onclick="registrarSalida()" disabled><span>Seleccioná el tipo</span></button>
  </div>
</div>

<!-- INVENTARIO -->
<div id="page-inventario" class="page">
  <div class="stats-row">
    <div class="stat-card azul"><div class="stat-val" id="stat-clientes">—</div><div class="stat-lbl">Pedidos</div></div>
    <div class="stat-card verde"><div class="stat-val" id="stat-total">—</div><div class="stat-lbl">Rollos</div></div>
    <div class="stat-card rojo"><div class="stat-val" id="stat-bajos">—</div><div class="stat-lbl">Stock bajo</div></div>
  </div>
  <div class="section-title">📊 Stock por Pedido</div>
  <div class="card">
    <ul class="stock-list" id="stock-list"><div class="empty"><div class="empty-icon">⏳</div><p>Cargando...</p></div></ul>
  </div>
</div>

<!-- HISTORIAL -->
<div id="page-historial" class="page">
  <div class="section-title">🕘 Últimos Movimientos</div>
  <div class="card">
    <ul class="mov-list" id="mov-list"><div class="empty"><div class="empty-icon">⏳</div><p>Cargando...</p></div></ul>
  </div>
</div>

<!-- MODAL EDITAR -->
<div class="modal-bg" id="modal-editar">
  <div class="modal-sheet">
    <div class="modal-title">
      ✏️ Editar Registro
      <button class="btn-close-modal" onclick="cerrarModal()">✕</button>
    </div>
    <input type="hidden" id="edit-fila">
    <div class="field"><label>N° de Pedido</label>
      <div class="input-voice">
        <input type="text" id="edit-num" autocomplete="off">
        <button class="btn-voice" onclick="iniciarVoz('edit-num','numero')">🎤</button>
      </div>
    </div>
    <div class="field"><label>Cliente</label>
      <div class="input-voice">
        <input type="text" id="edit-cliente" autocomplete="off">
        <button class="btn-voice" onclick="iniciarVoz('edit-cliente','texto')">🎤</button>
      </div>
    </div>
    <div class="field"><label>Cantidad</label>
      <div class="input-voice">
        <input type="number" id="edit-cant" inputmode="numeric">
        <button class="btn-voice" onclick="iniciarVoz('edit-cant','numero')">🎤</button>
      </div>
    </div>
    <div class="field"><label>Tipo</label>
      <select id="edit-tipo">
        <option value="INGRESO">INGRESO</option>
        <option value="ENVIO">ENVÍO</option>
        <option value="DESARME">DESARME</option>
      </select>
    </div>
    <div class="field"><label>Día</label>
      <select id="edit-dia">
        <option>Lunes</option><option>Martes</option><option>Miércoles</option>
        <option>Jueves</option><option>Viernes</option><option>Sábado</option>
      </select>
    </div>
    <button class="btn-submit azul" id="btn-guardar-edit" onclick="guardarEdicion()" style="margin-top:16px"><span>💾 Guardar Cambios</span></button>
    <button class="btn-submit" onclick="eliminarRegistro()" style="margin-top:10px;background:var(--red);color:#fff"><span>🗑️ Eliminar Registro</span></button>
  </div>
</div>

<div id="toast"></div>

<script>
var GAS_URL = "https://script.google.com/macros/s/AKfycbzcM5DHgiy9ErkuzyEDg0tiPTiCQZ1UvYx9_1BGuH-SG8Siuo8ICrZIW5rv3vGbiv_EHw/exec";
var clientes = [], inventario = [], tipoSalida = null, transporteSeleccionado = null;
var historialData = [];

setDiaActual();
cargarClientes();
setInterval(setDiaActual, 60000);

// ── VOZ ──
var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
var reconActivo = null;

function iniciarVoz(inputId, modo) {
  if (!SpeechRecognition) { mostrarToast("⚠️ Tu navegador no soporta voz","warn"); return; }
  var btn = document.querySelector('[onclick="iniciarVoz(\''+inputId+'\',\''+modo+'\')"]');
  if (reconActivo) { reconActivo.stop(); reconActivo = null; if(btn) btn.classList.remove("escuchando"); return; }
  var rec = new SpeechRecognition();
  rec.lang = "es-AR";
  rec.continuous = false;
  rec.interimResults = false;
  rec.onstart = function(){ if(btn) btn.classList.add("escuchando"); mostrarToast("🎤 Escuchando...","warn"); };
  rec.onresult = function(e){
    var texto = e.results[0][0].transcript;
    if (modo === "numero") texto = texto.replace(/\D/g,"");
    document.getElementById(inputId).value = texto;
    document.getElementById(inputId).dispatchEvent(new Event("input"));
    mostrarToast("✅ \"" + texto + "\"");
  };
  rec.onerror = function(){ mostrarToast("⚠️ No se escuchó nada","error"); };
  rec.onend = function(){ if(btn) btn.classList.remove("escuchando"); reconActivo = null; };
  reconActivo = rec;
  rec.start();
}

function setDiaActual() {
  var dias = ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
  var ahora = new Date();
  var diaHoy = dias[ahora.getDay()];
  document.getElementById("fechaHeader").textContent = ahora.toLocaleDateString("es-AR",{weekday:"long",day:"numeric",month:"long"}).replace(/^./,function(s){return s.toUpperCase();});
  ["dia-ingreso","dia-salida"].forEach(function(id){
    var sel = document.getElementById(id);
    for (var i=0;i<sel.options.length;i++){ if(sel.options[i].value===diaHoy){sel.selectedIndex=i;break;} }
  });
}

function mostrarPagina(nombre, tabEl) {
  document.querySelectorAll(".page").forEach(function(p){ p.classList.remove("active"); });
  document.querySelectorAll(".tab").forEach(function(t){ t.classList.remove("active"); });
  document.getElementById("page-"+nombre).classList.add("active");
  tabEl.classList.add("active");
  if (nombre==="inventario") cargarInventario();
  if (nombre==="historial") cargarHistorial();
}

function selTipo(tipo) {
  tipoSalida = tipo;
  transporteSeleccionado = null;
  document.querySelectorAll(".transport-btn").forEach(function(b){ b.classList.remove("selected"); });
  document.getElementById("tipo-envio").className = "tipo-btn"+(tipo==="envio"?" sel-envio":"");
  document.getElementById("tipo-desarme").className = "tipo-btn"+(tipo==="desarme"?" sel-desarme":"");
  document.getElementById("transport-section").className = "transport-section"+(tipo==="envio"?" visible":"");
  var btn = document.getElementById("btn-salida");
  btn.disabled = false;
  if (tipo==="envio") { btn.className="btn-submit verde"; btn.innerHTML="<span>Confirmar Envío 🚚</span>"; }
  else { btn.className="btn-submit morado"; btn.innerHTML="<span>Confirmar Desarme 🔧</span>"; }
}

function selTransporte(el, nombre) {
  transporteSeleccionado = nombre;
  document.querySelectorAll(".transport-btn").forEach(function(b){ b.classList.remove("selected"); });
  el.classList.add("selected");
}

function llamar(action, params) {
  var url = GAS_URL + "?action=" + encodeURIComponent(action);
  if (params) url += "&data=" + encodeURIComponent(JSON.stringify(params));
  return fetch(url).then(function(r){ return r.json(); }).catch(function(){ return {ok:false,msg:"Error de red"}; });
}

function cargarClientes() {
  llamar("obtenerClientes").then(function(res){ if(res&&res.clientes) clientes=res.clientes; });
}

function buscarPedido() {
  var val = document.getElementById("numcli-salida").value.trim();
  var sugs = document.getElementById("sugs-salida");
  if (!val) { sugs.style.display="none"; ocultarPreview("salida"); actualizarStockPreview(); return; }
  var exacto = clientes.find(function(c){ return c.num===val; });
  if (exacto) { mostrarPreview("salida", exacto); sugs.style.display="none"; actualizarStockPreview(); return; }
  ocultarPreview("salida"); actualizarStockPreview();
  var hits = clientes.filter(function(c){ return c.num.startsWith(val)||c.nombre.toLowerCase().includes(val.toLowerCase()); }).slice(0,8);
  if (!hits.length) { sugs.style.display="none"; return; }
  sugs.innerHTML = hits.map(function(c){
    return '<div class="sug-item" ontouchend="elegirCliente(\'salida\',\''+c.num.replace(/'/g,"&#39;")+'\',\''+c.nombre.replace(/'/g,"&#39;")+'\')"><span class="sug-num">'+c.num+'</span><span>'+c.nombre+'</span></div>';
  }).join("");
  sugs.style.display = "block";
}

function filtrarSugerencias(form) {
  var val = document.getElementById("numcli-"+form).value.trim();
  var sugs = document.getElementById("sugs-"+form);
  if (!val) { sugs.style.display="none"; ocultarPreview(form); return; }
  var exacto = clientes.find(function(c){ return c.num===val; });
  if (exacto) { mostrarPreview(form, exacto); sugs.style.display="none"; return; }
  ocultarPreview(form);
  var hits = clientes.filter(function(c){ return c.num.startsWith(val)||c.nombre.toLowerCase().includes(val.toLowerCase()); }).slice(0,8);
  if (!hits.length) { sugs.style.display="none"; return; }
  sugs.innerHTML = hits.map(function(c){
    return '<div class="sug-item" ontouchend="elegirCliente(\''+form+'\',\''+c.num.replace(/'/g,"&#39;")+'\',\''+c.nombre.replace(/'/g,"&#39;")+'\')"><span class="sug-num">'+c.num+'</span><span>'+c.nombre+'</span></div>';
  }).join("");
  sugs.style.display = "block";
}

function elegirCliente(form, num, nombre) {
  document.getElementById("numcli-"+form).value = num;
  document.getElementById("sugs-"+form).style.display = "none";
  mostrarPreview(form, {num:num, nombre:nombre});
  if (form==="salida") actualizarStockPreview();
  var cli = document.getElementById("cli-"+form);
  if (cli) cli.value = nombre;
}

function mostrarPreview(form, cliente) {
  var prev = document.getElementById("preview-"+form);
  if (!prev) return;
  document.getElementById("preview-"+form+"-nombre").textContent = cliente.nombre;
  document.getElementById("preview-"+form+"-num").textContent = "N° Pedido: " + cliente.num;
  prev.style.display = "block";
  var cli = document.getElementById("cli-"+form);
  if (cli) cli.value = cliente.nombre;
  if (form === "salida") {
    var item = inventario.find(function(i){ return i.numCliente.toString()===cliente.num; });
    if (item && item.stock > 0) {
      document.getElementById("cant-salida").value = item.stock;
    }
    actualizarStockPreview();
  }
}

function ocultarPreview(form) {
  var prev = document.getElementById("preview-"+form);
  if (prev) prev.style.display = "none";
}

document.addEventListener("click", function(e){
  ["sugs-ingreso","sugs-salida"].forEach(function(id){ var el=document.getElementById(id); if(el&&!el.contains(e.target)) el.style.display="none"; });
});

function actualizarStockPreview() {
  var numCli = document.getElementById("numcli-salida").value.trim();
  var el = document.getElementById("stock-preview");
  if (!numCli) { el.textContent="—"; el.style.color="var(--muted)"; return; }
  var item = inventario.find(function(i){ return i.numCliente.toString()===numCli; });
  if (item) { el.textContent=item.stock+" rollos"; el.style.color=item.stock===0?"var(--red)":item.stock<5?"var(--accent)":"var(--green)"; }
  else { el.textContent="Sin stock"; el.style.color="var(--red)"; }
}

function getNombre(form) {
  var num = document.getElementById("numcli-"+form).value.trim();
  var cli = document.getElementById("cli-"+form);
  if (cli && cli.value.trim()) return cli.value.trim();
  var found = clientes.find(function(c){ return c.num===num; });
  return found ? found.nombre : "";
}

function registrarIngreso() {
  var num = document.getElementById("numcli-ingreso").value.trim();
  var nombre = getNombre("ingreso");
  var cant = document.getElementById("cant-ingreso").value;
  var dia = document.getElementById("dia-ingreso").value;
  if (!num) { mostrarToast("⚠️ Ingresá el N° de pedido","error"); return; }
  if (!nombre) { mostrarToast("⚠️ Ingresá el nombre del cliente","error"); return; }
  if (!cant||parseInt(cant)<=0) { mostrarToast("⚠️ Ingresá la cantidad","error"); return; }
  var btn = document.getElementById("btn-ingreso"); setLoading(btn,true,"dark");
  llamar("registrarIngreso",{dia:dia,numCliente:num,cliente:nombre,cantidad:cant}).then(function(res){
    setLoading(btn,false);
    mostrarToast(res.msg||(res.ok?"✅ Ingreso registrado":"❌ Error"),res.ok?"ok":"error");
    if(res.ok){ limpiarForm("ingreso"); cargarClientes(); }
  });
}

function registrarSalida() {
  if (!tipoSalida) { mostrarToast("⚠️ Seleccioná Envío o Desarme","error"); return; }
  if (tipoSalida==="envio" && !transporteSeleccionado) { mostrarToast("⚠️ Seleccioná la empresa de transporte","error"); return; }
  var num = document.getElementById("numcli-salida").value.trim();
  var nombre = getNombre("salida");
  var cant = document.getElementById("cant-salida").value;
  var dia = document.getElementById("dia-salida").value;
  if (!num) { mostrarToast("⚠️ Ingresá el N° de pedido","error"); return; }
  if (!nombre) { mostrarToast("⚠️ Pedido no encontrado","error"); return; }
  if (!cant||parseInt(cant)<=0) { mostrarToast("⚠️ Ingresá la cantidad","error"); return; }
  var btn = document.getElementById("btn-salida"); setLoading(btn,true,"white");
  llamar("registrarSalida",{dia:dia,numCliente:num,cliente:nombre,cantidad:cant,tipo:tipoSalida.toUpperCase(),transporte:tipoSalida==="envio"?transporteSeleccionado:""}).then(function(res){
    setLoading(btn,false);
    if(tipoSalida==="envio") btn.innerHTML="<span>Confirmar Envío 🚚</span>";
    else btn.innerHTML="<span>Confirmar Desarme 🔧</span>";
    mostrarToast(res.msg||(res.ok?"✅ Registrado":"❌ Error"),res.ok?"ok":"error");
    if(res.ok){ limpiarSalida(); }
  });
}

function limpiarForm(form) {
  document.getElementById("numcli-"+form).value="";
  var cli=document.getElementById("cli-"+form); if(cli) cli.value="";
  var cant=document.getElementById("cant-"+form); if(cant) cant.value="";
  ocultarPreview(form);
}

function limpiarSalida() {
  document.getElementById("numcli-salida").value="";
  document.getElementById("cant-salida").value="";
  document.getElementById("stock-preview").textContent="—";
  document.getElementById("stock-preview").style.color="var(--muted)";
  ocultarPreview("salida");
  transporteSeleccionado = null;
  document.querySelectorAll(".transport-btn").forEach(function(b){ b.classList.remove("selected"); });
}

function cargarInventario() {
  document.getElementById("stock-list").innerHTML='<div class="empty"><div class="empty-icon">⏳</div><p>Cargando...</p></div>';
  llamar("obtenerInventario").then(function(res){ inventario=res.rows||[]; renderInventario(inventario); });
}

function renderInventario(rows) {
  var list=document.getElementById("stock-list");
  if (!rows||!rows.length) {
    list.innerHTML='<div class="empty"><div class="empty-icon">📭</div><p>Sin datos aún</p></div>';
    ["stat-clientes","stat-total","stat-bajos"].forEach(function(id){document.getElementById(id).textContent="0";});
    return;
  }
  var total=0,bajos=0;
  rows.forEach(function(r){total+=r.stock;if(r.stock<5)bajos++;});
  document.getElementById("stat-clientes").textContent=rows.length;
  document.getElementById("stat-total").textContent=total;
  document.getElementById("stat-bajos").textContent=bajos;
  list.innerHTML=rows.map(function(r){
    var cls=r.stock===0?"vacio":r.stock<5?"bajo":"ok";
    return '<li class="stock-item"><div class="stock-avatar">'+(r.cliente||"?").charAt(0).toUpperCase()+'</div><div class="stock-info"><div class="stock-nombre">'+r.cliente+'</div><div class="stock-num">N° Pedido: '+r.numCliente+'</div></div><div class="stock-qty '+cls+'">'+r.stock+'</div></li>';
  }).join("");
}

function cargarHistorial() {
  document.getElementById("mov-list").innerHTML='<div class="empty"><div class="empty-icon">⏳</div><p>Cargando...</p></div>';
  llamar("obtenerMovimientos").then(function(res){ historialData=res.rows||[]; renderHistorial(historialData); });
}

function renderHistorial(rows) {
  var list=document.getElementById("mov-list");
  if (!rows||!rows.length) { list.innerHTML='<div class="empty"><div class="empty-icon">📭</div><p>Sin movimientos</p></div>'; return; }
  list.innerHTML=rows.map(function(r,idx){
    var esIng=r.tipo==="INGRESO", esEnv=r.tipo==="ENVIO";
    var cls=esIng?"ing":esEnv?"env":"dsm";
    var ico=esIng?"➕":esEnv?"🚚":"🔧";
    var sig=esIng?"+":"−";
    var label=esIng?"INGRESO":esEnv?"ENVÍO":"DESARME";
    var transp = r.transporte ? " · "+r.transporte : "";
    var hora = r.hora ? " " + r.hora : "";
    return '<li class="mov-item"><div class="mov-ico '+cls+'">'+ico+'</div><div class="mov-datos"><div class="mov-cliente">'+r.cliente+'</div><div class="mov-detalle">'+label+transp+' · '+r.dia+' · '+r.fecha+hora+' · N° '+r.numCliente+'</div><button class="btn-edit-mov" onclick="abrirEditar('+idx+')">✏️ Editar</button></div><div class="mov-cant '+cls+'">'+sig+r.cantidad+'</div></li>';
  }).join("");
}

// ── EDITAR ──
function abrirEditar(idx) {
  var r = historialData[idx];
  if (!r) return;
  document.getElementById("edit-fila").value = r.fila !== undefined ? r.fila : idx;
  document.getElementById("edit-num").value = r.numCliente || "";
  document.getElementById("edit-cliente").value = r.cliente || "";
  document.getElementById("edit-cant").value = r.cantidad || "";
  var tipoEl = document.getElementById("edit-tipo");
  tipoEl.value = r.tipo || "INGRESO";
  var sel = document.getElementById("edit-dia");
  for (var i=0;i<sel.options.length;i++){ if(sel.options[i].value===r.dia){sel.selectedIndex=i;break;} }
  document.getElementById("modal-editar").classList.add("open");
}

function cerrarModal() {
  document.getElementById("modal-editar").classList.remove("open");
}

function eliminarRegistro() {
  var fila = document.getElementById("edit-fila").value;
  var cliente = document.getElementById("edit-cliente").value;
  if (!confirm) { mostrarToast("⚠️ No se pudo confirmar","error"); return; }
  var btn = document.querySelector('[onclick="eliminarRegistro()"]');
  setLoading(btn, true, "white");
  llamar("eliminarMovimiento", { fila: fila, cliente: cliente }).then(function(res){
    setLoading(btn, false);
    btn.innerHTML = "<span>🗑️ Eliminar Registro</span>";
    mostrarToast(res.msg||(res.ok?"✅ Eliminado":"❌ Error"), res.ok?"ok":"error");
    if(res.ok){ cerrarModal(); cargarHistorial(); cargarInventario(); }
  });
}

function guardarEdicion() {
  var datos = {
    fila: document.getElementById("edit-fila").value,
    numCliente: document.getElementById("edit-num").value.trim(),
    cliente: document.getElementById("edit-cliente").value.trim(),
    cantidad: document.getElementById("edit-cant").value,
    tipo: document.getElementById("edit-tipo").value,
    dia: document.getElementById("edit-dia").value
  };
  if (!datos.numCliente||!datos.cliente||!datos.cantidad) { mostrarToast("⚠️ Completá todos los campos","error"); return; }
  var btn = document.getElementById("btn-guardar-edit"); setLoading(btn,true,"dark");
  llamar("editarMovimiento",datos).then(function(res){
    setLoading(btn,false);
    mostrarToast(res.msg||(res.ok?"✅ Guardado":"❌ Error"),res.ok?"ok":"error");
    if(res.ok){ cerrarModal(); cargarHistorial(); cargarInventario(); }
  });
}

function setLoading(btn,loading,spinColor){
  btn.disabled=loading;
  if(loading){if(!btn.dataset.orig)btn.dataset.orig=btn.innerHTML;btn.innerHTML='<div class="spinner'+(spinColor==="dark"?" dark":"")+'"></div>';}
  else{if(btn.dataset.orig)btn.innerHTML=btn.dataset.orig;}
}

var toastTimer;
function mostrarToast(msg,type){
  var t=document.getElementById("toast");
  t.textContent=msg;
  t.className="show"+(type==="error"?" error":type==="warn"?" warn":"");
  clearTimeout(toastTimer);
  toastTimer=setTimeout(function(){t.className="";},3200);
}

document.getElementById("numcli-salida").addEventListener("input", actualizarStockPreview);
</script>
